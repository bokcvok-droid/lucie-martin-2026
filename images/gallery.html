<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galerie | Lucie & Martin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FAF8F5; --gold: #C4956A; --gold-l: #D4AC82;
      --brown: #3D3028; --brown-l: #6B5744;
      --dark: rgba(0,0,0,0.85);
    }
    body {
      background: var(--cream); color: var(--brown);
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100svh;
    }

    /* ── Header ── */
    .site-header {
      text-align: center; padding: 2.5rem 1rem 1.5rem;
      border-bottom: 1px solid rgba(196,149,106,.2);
      background: #fff;
    }
    .site-header h1 { font-family: Georgia, serif; font-weight: 400; font-size: clamp(1.8rem,6vw,2.4rem); }
    .site-header h1 em { color: var(--gold); font-style: italic; }
    .site-header p { color: var(--brown-l); margin-top: .35rem; font-size: .9rem; }
    .divider { width: 60px; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); margin: .8rem auto; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: .7rem;
      max-width: 1400px; margin: 1.2rem auto; padding: 0 1rem;
    }
    .count { font-size: .88rem; color: var(--brown-l); }
    .btn-upload-link {
      background: var(--gold); color: #fff; border: none; border-radius: 8px;
      padding: .55rem 1.1rem; font-size: .9rem; text-decoration: none;
      font-family: Georgia, serif; cursor: pointer; transition: background .2s;
    }
    .btn-upload-link:hover { background: var(--brown-l); }

    /* ── Gallery grid ── */
    .gallery {
      max-width: 1400px; margin: 0 auto; padding: .5rem 1rem 3rem;
      columns: 4 220px; column-gap: .75rem;
    }
    .gallery-item {
      break-inside: avoid; margin-bottom: .75rem;
      border-radius: 10px; overflow: hidden; cursor: pointer;
      background: #e8e4e0;
      box-shadow: 0 2px 8px rgba(61,48,40,.1);
      transition: transform .2s, box-shadow .2s;
      position: relative;
    }
    .gallery-item:hover { transform: translateY(-3px); box-shadow: 0 6px 18px rgba(61,48,40,.18); }
    .gallery-item img, .gallery-item video {
      display: block; width: 100%; height: auto;
    }
    .gallery-item .video-badge {
      position: absolute; top: .5rem; right: .5rem;
      background: rgba(0,0,0,.55); color: #fff; font-size: .72rem;
      border-radius: 4px; padding: .15rem .4rem;
    }

    /* ── Empty / loading states ── */
    .state-box {
      max-width: 480px; margin: 4rem auto; text-align: center; padding: 0 1rem;
    }
    .state-box .icon { font-size: 3rem; margin-bottom: 1rem; }
    .state-box h2 { font-family: Georgia, serif; font-weight: 400; font-size: 1.4rem; margin-bottom: .5rem; }
    .state-box p { color: var(--brown-l); font-size: .9rem; line-height: 1.7; }
    .spinner {
      width: 36px; height: 36px; border: 3px solid rgba(196,149,106,.25);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Lightbox ── */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: var(--dark); align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox-inner {
      position: relative; max-width: 96vw; max-height: 92vh;
      display: flex; align-items: center; justify-content: center;
    }
    .lightbox-inner img, .lightbox-inner video {
      max-width: 96vw; max-height: 88vh;
      border-radius: 8px; object-fit: contain;
    }
    .lb-close {
      position: fixed; top: 1rem; right: 1.2rem;
      color: #fff; font-size: 2rem; cursor: pointer; line-height: 1;
      background: none; border: none; z-index: 1001;
      transition: opacity .2s;
    }
    .lb-close:hover { opacity: .7; }
    .lb-arrow {
      position: fixed; top: 50%; transform: translateY(-50%);
      color: #fff; font-size: 2.2rem; cursor: pointer;
      background: rgba(0,0,0,.35); border: none; border-radius: 50%;
      width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
      transition: background .2s; z-index: 1001;
    }
    .lb-arrow:hover { background: rgba(0,0,0,.6); }
    .lb-prev { left: .7rem; }
    .lb-next { right: .7rem; }
    .lb-counter {
      position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,.7); font-size: .85rem;
    }
    .lb-download {
      position: fixed; bottom: 1rem; right: 1.2rem;
      color: rgba(255,255,255,.7); font-size: .85rem; text-decoration: none;
      background: rgba(0,0,0,.3); border-radius: 6px; padding: .35rem .7rem;
      transition: background .2s;
    }
    .lb-download:hover { background: rgba(0,0,0,.6); color: #fff; }

    /* ── Footer ── */
    footer { text-align: center; padding: 1.5rem 1rem; font-family: Georgia, serif; font-style: italic; color: var(--brown-l); font-size: .85rem; }
    .back-link { display: block; text-align: center; margin-bottom: 1rem; color: var(--brown-l); text-decoration: none; font-size: .88rem; }
    .back-link:hover { color: var(--gold); }
  </style>
</head>
<body>

<header class="site-header">
  <h1>Lucie <em>&amp;</em> Martin</h1>
  <div class="divider"></div>
  <p>Galerie fotek ze svatebního dne 📸</p>
</header>

<div class="toolbar">
  <span class="count" id="countLabel">Načítám…</span>
  <a href="upload.html" class="btn-upload-link">+ Nahrát fotky</a>
</div>

<main id="gallery" class="gallery">
  <div class="state-box" id="loadingState">
    <div class="spinner"></div>
    <h2>Načítám galerii…</h2>
    <p>Chvíli strpení, fotky se načítají.</p>
  </div>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Náhled fotky">
  <button class="lb-close" id="lbClose" aria-label="Zavřít">✕</button>
  <button class="lb-arrow lb-prev" id="lbPrev" aria-label="Předchozí">‹</button>
  <div class="lightbox-inner" id="lbInner"></div>
  <button class="lb-arrow lb-next" id="lbNext" aria-label="Další">›</button>
  <span class="lb-counter" id="lbCounter"></span>
  <a class="lb-download" id="lbDownload" download target="_blank">⬇ Stáhnout</a>
</div>

<footer>
  <a href="index.html" class="back-link">← Zpět na svatební web</a>
  Lucie &amp; Martin · 18. 4. 2026 · Těšíme se na Vás! 🌿
</footer>

<script>
  const WORKER = "https://soft-band-c581.bokcvok.workers.dev";

  const galleryEl   = document.getElementById('gallery');
  const loadingState = document.getElementById('loadingState');
  const countLabel  = document.getElementById('countLabel');
  const lightbox    = document.getElementById('lightbox');
  const lbInner     = document.getElementById('lbInner');
  const lbCounter   = document.getElementById('lbCounter');
  const lbDownload  = document.getElementById('lbDownload');

  let items = [];   // { key, url, isVideo }
  let currentIdx = 0;

  // ── Pomocné funkce ─────────────────────────────────────────────────────────
  function isVideo(key) {
    return /\.(mp4|mov|webm|avi|mkv)$/i.test(key);
  }

  function fileUrl(key) {
    const R2_PUBLIC = "https://pub-88f291442e03440db00b772861f1ed5a.r2.dev";
    return `${R2_PUBLIC}/${encodeURIComponent(key).replace(/%2F/g, '/')}`;
  }

  function formatSize(bytes) {
    if (bytes > 1048576) return (bytes / 1048576).toFixed(1) + ' MB';
    if (bytes > 1024) return (bytes / 1024).toFixed(0) + ' KB';
    return bytes + ' B';
  }

  // ── Načtení fotek ──────────────────────────────────────────────────────────
  async function loadGallery() {
    try {
      const resp = await fetch(`${WORKER}/list`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const { files } = await resp.json();

      // Filtr — jen obrázky a videa, vynech bg/ a program/ složky
      const media = files.filter(f =>
        /\.(jpe?g|png|gif|webp|heic|heif|mp4|mov|webm|avi|mkv)$/i.test(f.key) &&
        !f.key.startsWith('bg/') &&
        !f.key.startsWith('program/')
      );

      // Seřadit od nejnovějšího
      media.sort((a, b) => new Date(b.uploaded) - new Date(a.uploaded));

      // Sestavit items
      items = media.map(f => ({
        key: f.key,
        url: fileUrl(f.key),
        isVideo: isVideo(f.key),
        size: f.size,
      }));

      renderGallery();
    } catch (e) {
      loadingState.innerHTML = `
        <div class="icon">⚠️</div>
        <h2>Nepodařilo se načíst galerii</h2>
        <p>${e.message}<br><br>Zkuste obnovit stránku.</p>
      `;
    }
  }

  function renderGallery() {
    galleryEl.innerHTML = '';

    if (items.length === 0) {
      galleryEl.innerHTML = `
        <div class="state-box">
          <div class="icon">📸</div>
          <h2>Zatím žádné fotky</h2>
          <p>Buďte první, kdo nahraje vzpomínku ze svatby!</p>
        </div>
      `;
      countLabel.textContent = '0 fotek';
      return;
    }

    countLabel.textContent = `${items.length} ${items.length === 1 ? 'fotka' : items.length < 5 ? 'fotky' : 'fotek'}`;

    items.forEach((item, idx) => {
      const el = document.createElement('div');
      el.className = 'gallery-item';
      el.setAttribute('role', 'button');
      el.setAttribute('tabindex', '0');
      el.setAttribute('aria-label', `Zobrazit ${item.isVideo ? 'video' : 'fotku'} ${idx + 1}`);

      if (item.isVideo) {
        el.innerHTML = `
          <video src="${item.url}" muted preload="metadata" loading="lazy"></video>
          <span class="video-badge">▶ video</span>
        `;
      } else {
        el.innerHTML = `<img src="${item.url}" alt="Fotka ze svatby ${idx + 1}" loading="lazy" decoding="async">`;
      }

      el.addEventListener('click', () => openLightbox(idx));
      el.addEventListener('keydown', e => e.key === 'Enter' && openLightbox(idx));
      galleryEl.appendChild(el);
    });
  }

  // ── Lightbox ───────────────────────────────────────────────────────────────
  function openLightbox(idx) {
    currentIdx = idx;
    showLbItem();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
    lbInner.innerHTML = '';   // zastaví přehrávání videa
  }

  function showLbItem() {
    const item = items[currentIdx];
    lbInner.innerHTML = '';
    if (item.isVideo) {
      const v = document.createElement('video');
      v.src = item.url; v.controls = true; v.autoplay = true;
      v.style.maxWidth = '96vw'; v.style.maxHeight = '88vh'; v.style.borderRadius = '8px';
      lbInner.appendChild(v);
    } else {
      const img = document.createElement('img');
      img.src = item.url; img.alt = `Fotka ze svatby ${currentIdx + 1}`;
      lbInner.appendChild(img);
    }
    lbCounter.textContent = `${currentIdx + 1} / ${items.length}`;
    lbDownload.href = item.url;
    lbDownload.download = item.key.split('/').pop();
  }

  function prevItem() { currentIdx = (currentIdx - 1 + items.length) % items.length; showLbItem(); }
  function nextItem() { currentIdx = (currentIdx + 1) % items.length; showLbItem(); }

  document.getElementById('lbClose').addEventListener('click', closeLightbox);
  document.getElementById('lbPrev').addEventListener('click', prevItem);
  document.getElementById('lbNext').addEventListener('click', nextItem);
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') prevItem();
    if (e.key === 'ArrowRight') nextItem();
  });

  // ── Start ──────────────────────────────────────────────────────────────────
  loadGallery();
</script>
</body>
</html>
